version: "3.8"

services:
  payment-gateway:
    container_name: payment-gateway
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5067:5067"
    environment:
      # Production disables Swagger UI and uses production-style error pages.
      - ASPNETCORE_ENVIRONMENT=Production
      # Bind to all interfaces inside the container on the port Prometheus scrapes.
      - ASPNETCORE_URLS=http://+:5067
      # Reach the other services by their compose service names, not localhost.
      - BankSimulator__BaseUrl=http://bank_simulator:8080
      - Observability__LokiUri=http://loki:3100
    depends_on:
      - bank_simulator
      - loki

  bank_simulator:
    container_name: bank_simulator
    image: bbyars/mountebank:2.8.1
    ports:
      - "2525:2525"
      - "8080:8080"
    command: --configfile /imposters/bank_simulator.ejs --allowInjection
    volumes:
      - type: bind
        source: ./imposters
        target: /imposters

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - type: bind
        source: ./prometheus
        target: /etc/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    container_name: loki
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    container_name: grafana
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    volumes:
      - type: bind
        source: ./grafana/provisioning
        target: /etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
